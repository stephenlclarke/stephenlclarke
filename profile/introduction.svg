<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" role="img" aria-labelledby="title description">
  <title id="title">Steve Clarke</title>
  <desc id="description">SRE and DevOps engineer working with trading systems, FIX Protocol, arcade-game rebuilds, and ESP32 projects. The panel includes a short biography and current areas of focus.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#070804"/>
      <stop offset="20%" stop-color="#161715"/>
      <stop offset="42%" stop-color="#5F3C3C"/>
      <stop offset="58%" stop-color="#B77E87"/>
      <stop offset="78%" stop-color="#4E5F6E"/>
      <stop offset="100%" stop-color="#EADFD6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#161715"/>
      <stop offset="100%" stop-color="#242A31"/>
    </linearGradient>
    <style>
      .wave-top-accent,
      .wave-top-highlight,
      .wave-bottom-accent,
      .wave-bottom-highlight {
        transform-box: fill-box;
        transform-origin: center;
      }

      .wave-top-accent { animation: wave-top-drift 8s ease-in-out infinite; }
      .wave-top-highlight { animation: wave-top-highlight-drift 8s ease-in-out infinite; }
      .wave-bottom-accent { animation: wave-bottom-drift 8s ease-in-out infinite; }
      .wave-bottom-highlight { animation: wave-bottom-highlight-drift 8s ease-in-out infinite; }

      @keyframes wave-top-drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(18px); }
      }

      @keyframes wave-top-highlight-drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(12px); }
      }

      @keyframes wave-bottom-drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-18px); }
      }

      @keyframes wave-bottom-highlight-drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .wave-top-accent,
        .wave-top-highlight,
        .wave-bottom-accent,
        .wave-bottom-highlight { animation: none; }
      }
    </style>
  </defs>

  <rect width="960" height="760" fill="url(#panel)"/>
  <path class="wave-top-accent" d="M0 -20H960V155C744 120 585 145 425 132C248 118 128 78 0 56Z" fill="url(#accent)" opacity="0.88"/>
  <path class="wave-top-highlight" d="M0 0H960V19C766 10 600 27 428 18C244 7 118 9 0 3Z" fill="#FFFFFF" opacity="0.16"/>

  <g fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="480" y="95" text-anchor="middle" font-size="52" font-weight="700">Steve Clarke</text>
    <text x="480" y="123" text-anchor="middle" font-size="16" font-weight="600">SRE / DevOps &#8226; Trading systems &#8226; FIX Protocol &#8226; 1980&apos;s Arcade Games &#8226; ESP32 tinkering</text>

    <path d="M42 179H918" stroke="#EADFD6" stroke-opacity="0.42"/>
    <path d="M618 188V657" stroke="#EADFD6" stroke-opacity="0.25"/>

    <text x="42" y="220" font-size="23" font-weight="700">From ZX81 game hacks to trading systems</text>
    <g fill="#F0ECE7" font-size="16.5">
      <text x="42" y="255">My first programming adventure was Z80 assembler on a Sinclair</text>
      <text x="42" y="279">ZX81, mostly trying to make games easier to play. Somehow that</text>
      <text x="42" y="303">led to paid work writing molecular-modelling software in</text>
      <text x="42" y="327">Fortran, C, and C++ on minis, mainframes, and supercomputers.</text>

      <text x="42" y="369">I eventually settled into FinTech: trading platforms, exchange</text>
      <text x="42" y="393">connectivity, FIX Protocol, C++, Java, Go, Rust, and Swift.</text>
      <text x="42" y="417">These days I spend a lot of time around DevOps, SRE, metrics,</text>
      <text x="42" y="441">observability, and platform engineering.</text>

      <text x="42" y="483">I never lost the games thread, though. I have been learning Rust</text>
      <text x="42" y="507">by rebuilding classics I grew up with, and still enjoy hacking</text>
      <text x="42" y="531">around with ESP32 boards when the soldering iron starts looking</text>
      <text x="42" y="555">lonely.</text>

      <text x="42" y="597">Outside computing, rugby has been a long-running thread: I played</text>
      <text x="42" y="621">for years until my body made the retirement case then coached for</text>
      <text x="42" y="645">a while, and now enjoy watching Harlequins from time to time.</text>
    </g>

    <text x="650" y="220" font-size="23" font-weight="700">Current orbit</text>
    <g fill="#F0ECE7" font-size="17">
      <text x="650" y="261">&#8226; Implementing Docker Compose on</text>
      <text x="673" y="285">Apple/Container</text>
      <text x="650" y="327">&#8226; Reliability engineering and</text>
      <text x="673" y="351">observability</text>
      <text x="650" y="393">&#8226; Low-latency trading and FIX</text>
      <text x="673" y="417">connectivity</text>
      <text x="650" y="459">&#8226; Rust, Go, Swift, Java, C, and C++</text>
      <text x="650" y="501">&#8226; Classic 1980&apos;s arcade rebuilds</text>
      <text x="650" y="543">&#8226; ESP32 and small-board experiments</text>
      <text x="650" y="585">&#8226; Harlequins from the stands now</text>
      <text x="673" y="609">and then</text>
    </g>
  </g>

  <path class="wave-bottom-accent" d="M0 714C148 682 293 750 468 720C636 688 794 746 960 706V780H0Z" fill="url(#accent)" opacity="0.88"/>
  <path class="wave-bottom-highlight" d="M0 744C188 718 343 766 526 738C700 711 835 743 960 730V780H0Z" fill="#FFFFFF" opacity="0.18"/>
</svg>
