---
name: Profile metrics

"on":
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    env:
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when METRICS_TOKEN is missing
        if: ${{ env.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is not set; skipping Metrics generation."

      - name: Overview
        if: ${{ env.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: stephenlclarke
          filename: metrics.classic.svg
          output_action: none
          plugins_errors_fatal: "yes"
          config_timezone: Europe/London
          config_display: large
          base: header, activity, community, repositories, metadata

      - name: Commit generated metrics
        if: ${{ env.METRICS_TOKEN != '' }}
        run: |
          set -euo pipefail
          sudo cp /metrics_renders/*.svg .
          bot_email="41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config user.email "$bot_email"
          git add metrics.*.svg
          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
            exit 0
          fi
          git commit \
            -m "chore: update profile metrics [skip ci]"
          git push
